name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Validate & Tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Version Tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! $VERSION =~ ^v[0-9]+(\.[0-9]+){1,2}(-[a-zA-Z0-9\.]+)?$ ]]; then
            echo "Error: Invalid version format. Expected: v1.0, v1.0.0, v1.0-beta, v1.0.0-rc.1"
            exit 1
          fi
          echo "✅ Valid version: $VERSION"

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "${{ github.event.inputs.version }}"

  build-core-client:
    name: Build Client (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: prepare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ewp-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64, suffix: .exe }
          - { goos: windows, goarch: arm64, suffix: .exe }
          - { goos: linux,   goarch: amd64, suffix: ""   }
          - { goos: linux,   goarch: arm64, suffix: ""   }
          - { goos: darwin,  goarch: amd64, suffix: ""   }
          - { goos: darwin,  goarch: arm64, suffix: ""   }
          - { goos: freebsd, goarch: amd64, suffix: ""   }
          - { goos: freebsd, goarch: arm64, suffix: ""   }

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Build
        run: |
          cd cmd/client
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" \
            -o ../../ewp-core-client-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ewp-core/ewp-core-client-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  build-core-server:
    name: Build Server (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: prepare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ewp-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: ""   }
          - { goos: linux,   goarch: arm64, suffix: ""   }
          - { goos: windows, goarch: amd64, suffix: .exe }
          - { goos: windows, goarch: arm64, suffix: .exe }
          - { goos: darwin,  goarch: amd64, suffix: ""   }
          - { goos: darwin,  goarch: arm64, suffix: ""   }
          - { goos: freebsd, goarch: amd64, suffix: ""   }
          - { goos: freebsd, goarch: arm64, suffix: ""   }

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Build
        run: |
          cd cmd/server
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" \
            -o ../../ewp-core-server-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ewp-core/ewp-core-server-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  build-gui-windows:
    name: Build EWP-GUI (Windows)
    needs: build-core-client
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Download Core Client - Windows amd64
        uses: actions/download-artifact@v4
        with:
          name: client-windows-amd64
          path: ./core-binaries

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build GUI - Windows x64
        run: |
          cd ewp-gui
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -G "NMake Makefiles"
          nmake

      - name: Deploy Qt Dependencies
        run: |
          cd ewp-gui\build
          windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw EWP-GUI.exe

      - name: Package GUI with Core - Windows x64
        run: |
          mkdir ewp-gui-${{ github.event.inputs.version }}-windows-amd64
          xcopy /E /I ewp-gui\build ewp-gui-${{ github.event.inputs.version }}-windows-amd64
          copy core-binaries\ewp-core-client-${{ github.event.inputs.version }}-windows-amd64.exe ewp-gui-${{ github.event.inputs.version }}-windows-amd64\ewp-core.exe
          copy ewp-core\wintun.dll ewp-gui-${{ github.event.inputs.version }}-windows-amd64\

      - name: Create Archive
        run: |
          cd ewp-gui-${{ github.event.inputs.version }}-windows-amd64
          tar -czf ../ewp-gui-${{ github.event.inputs.version }}-windows-amd64.tar.gz *

      - name: Upload GUI Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-windows-amd64
          path: ewp-gui-${{ github.event.inputs.version }}-windows-amd64.tar.gz

  build-gui-linux:
    name: Build EWP-GUI (Linux)
    needs: build-core-client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Download Core Client - Linux amd64
        uses: actions/download-artifact@v4
        with:
          name: client-linux-amd64
          path: ./core-binaries

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.*'
          host: 'linux'
          target: 'desktop'
          cache: true

      - name: Build GUI - Linux x64
        run: |
          cd ewp-gui
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Package GUI with Core - Linux x64
        run: |
          mkdir -p ewp-gui-${{ github.event.inputs.version }}-linux-amd64/lib

          cp ewp-gui/build/EWP-GUI ewp-gui-${{ github.event.inputs.version }}-linux-amd64/
          cp core-binaries/ewp-core-client-${{ github.event.inputs.version }}-linux-amd64 ewp-gui-${{ github.event.inputs.version }}-linux-amd64/ewp-core

          ldd ewp-gui/build/EWP-GUI | grep Qt | awk '{print $3}' | xargs -I {} cp {} ewp-gui-${{ github.event.inputs.version }}-linux-amd64/lib/

          mkdir -p ewp-gui-${{ github.event.inputs.version }}-linux-amd64/plugins/platforms
          cp -r $Qt6_DIR/plugins/platforms/libqxcb.so ewp-gui-${{ github.event.inputs.version }}-linux-amd64/plugins/platforms/ || true

          cat > ewp-gui-${{ github.event.inputs.version }}-linux-amd64/EWP-GUI.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"
          export QT_PLUGIN_PATH="$DIR/plugins"
          exec "$DIR/EWP-GUI" "$@"
          EOF

          chmod +x ewp-gui-${{ github.event.inputs.version }}-linux-amd64/EWP-GUI
          chmod +x ewp-gui-${{ github.event.inputs.version }}-linux-amd64/EWP-GUI.sh
          chmod +x ewp-gui-${{ github.event.inputs.version }}-linux-amd64/ewp-core

      - name: Create Archive
        run: |
          tar -czf ewp-gui-${{ github.event.inputs.version }}-linux-amd64.tar.gz ewp-gui-${{ github.event.inputs.version }}-linux-amd64/

      - name: Upload GUI Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-linux-amd64
          path: ewp-gui-${{ github.event.inputs.version }}-linux-amd64.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-core-client, build-core-server, build-gui-windows, build-gui-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate Release Notes
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cat > release-notes.md << EOF
          # EWP-Workers ${VERSION}

          ## Components

          ### EWP-Core Client
          - Multi-platform: Windows, Linux, macOS, FreeBSD (amd64 / arm64)
          - ECH (Encrypted Client Hello) support
          - Multiple transport protocols (WebSocket, HTTP/3, gRPC, XHTTP)
          - DNS over HTTPS/TLS/QUIC with fallback

          ### EWP-Core Server
          - Multi-platform: Linux, Windows, macOS, FreeBSD (amd64 / arm64)
          - High-performance proxy server
          - Supports EWP and Trojan protocols

          ### EWP-GUI
          - Cross-platform graphical interface (Windows & Linux)
          - Node management and system proxy integration

          ## Downloads

          **Client:**
          | Platform | File |
          |----------|------|
          | Windows x64 | \`ewp-core-client-${VERSION}-windows-amd64.exe\` |
          | Windows arm64 | \`ewp-core-client-${VERSION}-windows-arm64.exe\` |
          | Linux x64 | \`ewp-core-client-${VERSION}-linux-amd64\` |
          | Linux arm64 | \`ewp-core-client-${VERSION}-linux-arm64\` |
          | macOS x64 | \`ewp-core-client-${VERSION}-darwin-amd64\` |
          | macOS arm64 (Apple Silicon) | \`ewp-core-client-${VERSION}-darwin-arm64\` |
          | FreeBSD x64 | \`ewp-core-client-${VERSION}-freebsd-amd64\` |
          | FreeBSD arm64 | \`ewp-core-client-${VERSION}-freebsd-arm64\` |

          **Server:**
          | Platform | File |
          |----------|------|
          | Linux x64 | \`ewp-core-server-${VERSION}-linux-amd64\` |
          | Linux arm64 | \`ewp-core-server-${VERSION}-linux-arm64\` |
          | Windows x64 | \`ewp-core-server-${VERSION}-windows-amd64.exe\` |
          | Windows arm64 | \`ewp-core-server-${VERSION}-windows-arm64.exe\` |
          | macOS x64 | \`ewp-core-server-${VERSION}-darwin-amd64\` |
          | macOS arm64 | \`ewp-core-server-${VERSION}-darwin-arm64\` |
          | FreeBSD x64 | \`ewp-core-server-${VERSION}-freebsd-amd64\` |
          | FreeBSD arm64 | \`ewp-core-server-${VERSION}-freebsd-arm64\` |

          **GUI (内核已内置，解压即用):**
          | Platform | File |
          |----------|------|
          | Windows x64 | \`ewp-gui-${VERSION}-windows-amd64.tar.gz\` |
          | Linux x64 | \`ewp-gui-${VERSION}-linux-amd64.tar.gz\` |

          See \`checksums.txt\` for SHA256 checksums.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: EWP-Workers ${{ github.event.inputs.version }}
          body_path: release-notes.md
          files: |
            release-assets/*
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release ${{ github.event.inputs.version }} created successfully!"
          echo "📦 Artifacts uploaded: $(ls -1 release-assets/ | wc -l) files"
